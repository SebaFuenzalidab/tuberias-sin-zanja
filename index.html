<section id="quienes" class="fade-in">

  <h2 class="section-title">Hacemos que los proyectos fluyan</h2>
  <div class="qs-grid">
    <div class="qs-text">
      <p>En Hidrogística creemos que el agua es el recurso más esencial y valioso de nuestro planeta. Somos un proveedor integral de servicios y materiales para el mercado del agua, capaces de enfrentar los grandes desafíos actuales con soluciones eficientes, innovadoras y sostenibles.</p>

  <div class="prob-grid">

      <div class="prob-card"><div class="prob-icon">💧</div><div><h4>Pérdidas de agua potable</h4><p>Chile pierde entre 25–35% del agua potable por fugas en redes deterioradas, equivalente a cientos de millones de dólares anuales.</p></div></div>
      <div class="prob-card"><div class="prob-icon">🚧</div><div><h4>Excavación = caos urbano</h4><p>Una obra tradicional interrumpe el tráfico por semanas, genera ruido, polvo, emisiones y afecta el comercio local hasta en un 40%.</p></div></div>

  <div class="sol-grid">
    <div class="sol-card"><div class="sol-icon">🔭</div><h3>Inspección Televisiva (ITV)</h3><p>Robots CCTV con norma NASSCO para evaluar el estado real de colectores. Detectamos roturas, filtraciones, corrosión y obstrucciones con precisión milimétrica.</p></div>
    <div class="sol-card"><div class="sol-icon">🔧</div><h3>Rehabilitación Sin Zanja (RSZ)</h3><p>Curapipe, Impreg GL16, ASOE y Nuflow. Creamos una nueva tubería dentro de la antigua sin excavar. Vida útil de 50 años.</p></div>
    <div class="sol-card"><div class="sol-icon">🔊</div><h3>Inspección Acústica SL-RAT</h3><p>Diagnóstico preventivo del estado de colectores mediante ondas sonoras. Clasificamos tramos en tiempo real para optimizar el mantenimiento.</p></div>

<script>
// COUNTER ANIMATION
function animateCounters() {
  document.querySelectorAll('.num[data-target]').forEach(function(el) {
    var target = parseInt(el.getAttribute('data-target'));
    var suffix = el.getAttribute('data-suffix') || '+';
    var current = 0;
    var increment = Math.ceil(target / 80);
    var timer = setInterval(function() {
      current += increment;
      if (current >= target) { current = target; clearInterval(timer); }
      el.textContent = current + suffix;
    }, 20);
  });
}
window.addEventListener('load', function() { setTimeout(animateCounters, 500); });
